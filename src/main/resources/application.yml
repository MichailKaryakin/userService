spring:
  application:
    name: user
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: prometheus,health,metrics,info
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

jwt:
  secret: your-secret-key-min-32-chars-long!!
  access-token-ttl-ms: 900000
  refresh-token-ttl-ms: 1209600000